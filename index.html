<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GirlzPic - Premium Photo Collections</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0c;--surface:#111114;--card:#16161a;--border:#2a2a30;--accent:#e8193c;--gold:#c9a84c;--text:#f0eee8;--muted:#6b6b72}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
.df{font-family:'Playfair Display',serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fi{animation:fadeIn 0.45s ease forwards}
.si{animation:scaleIn 0.3s ease forwards}
.card{position:relative;cursor:pointer;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card);transition:transform 0.3s,border-color 0.3s,box-shadow 0.3s}
.card:hover{transform:translateY(-5px) scale(1.01);border-color:var(--accent);box-shadow:0 16px 40px rgba(232,25,60,0.22)}
.card:hover .cimg{transform:scale(1.09)}
.card:hover .covr{opacity:1}
.cimg{width:100%;height:260px;object-fit:cover;display:block;transition:transform 0.5s}
.covr{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,transparent 60%);opacity:0.7;transition:opacity 0.3s}
.pi{position:relative;cursor:pointer;overflow:hidden;border-radius:8px;aspect-ratio:3/4;background:var(--card)}
.pi img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;display:block}
.pi:hover img{transform:scale(1.07)}
.pi::after{content:'🔍';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.8rem;background:rgba(232,25,60,0.28);opacity:0;transition:opacity 0.3s}
.pi:hover::after{opacity:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all 0.2s}
.bp{background:var(--accent);color:#fff}.bp:hover{background:#c91535}
.bg2{background:transparent;color:var(--text);border:1px solid var(--border)}.bg2:hover{border-color:var(--accent);color:var(--accent)}
.bi{width:36px;height:36px;padding:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.nt{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;white-space:nowrap}
.nt.act{background:var(--accent);color:#fff;border-color:var(--accent)}
.nt:hover:not(.act){border-color:var(--accent);color:var(--accent)}
.dz{border:2px dashed var(--border);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all 0.3s;background:var(--card)}
.dz:hover,.dz.drag{border-color:var(--accent);background:rgba(232,25,60,0.05)}
.pb{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.pf{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}
.lb{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.97);display:flex;flex-direction:column}
.lba{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.lbi{max-width:90vw;max-height:78vh;object-fit:contain;display:block;pointer-events:none}
.nbtn{position:absolute;z-index:10;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#fff;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.nbtn:hover{background:var(--accent)}
.thm{width:54px;height:68px;object-fit:cover;border-radius:6px;cursor:pointer;flex-shrink:0;transition:all 0.2s;opacity:0.5;border:2px solid transparent}
.thm.act{border-color:var(--accent);opacity:1}
.thm:hover{opacity:0.85}
input[type=text],input[type=password]{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%}
input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer}
@media(max-width:600px){
  .hide-mobile{display:none!important}
  .cimg{height:200px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const TC = { XIUREN:"#c9a84c", HOT:"#e8193c", NEW:"#2ec4b6", TRENDING:"#f72585", POPULAR:"#a855f7" };
const TAGS = ["ALL","XIUREN","HOT","NEW","TRENDING","POPULAR"];

const ALBUMS = [
  {id:1,title:"Xiuren No.6782",tag:"XIUREN",cover:"https://picsum.photos/seed/a1c/400/560",photos:Array.from({length:12},(_,i)=>`https://picsum.photos/seed/a1x${i}/800/1100`),views:12840,date:"2024-03-15"},
  {id:2,title:"Beauties Collection Vol.3",tag:"HOT",cover:"https://picsum.photos/seed/a2c/400/560",photos:Array.from({length:9},(_,i)=>`https://picsum.photos/seed/a2x${i}/800/1100`),views:9321,date:"2024-03-14"},
  {id:3,title:"Summer Vibes 2024",tag:"NEW",cover:"https://picsum.photos/seed/a3c/400/560",photos:Array.from({length:15},(_,i)=>`https://picsum.photos/seed/a3x${i}/800/1100`),views:4502,date:"2024-03-16"},
  {id:4,title:"Studio Gold Series",tag:"POPULAR",cover:"https://picsum.photos/seed/a4c/400/560",photos:Array.from({length:8},(_,i)=>`https://picsum.photos/seed/a4x${i}/800/1100`),views:7890,date:"2024-03-10"},
  {id:5,title:"Golden Hour Dreams",tag:"TRENDING",cover:"https://picsum.photos/seed/a5c/400/560",photos:Array.from({length:11},(_,i)=>`https://picsum.photos/seed/a5x${i}/800/1100`),views:15230,date:"2024-03-13"},
  {id:6,title:"Elegance & Grace",tag:"XIUREN",cover:"https://picsum.photos/seed/a6c/400/560",photos:Array.from({length:7},(_,i)=>`https://picsum.photos/seed/a6x${i}/800/1100`),views:6120,date:"2024-03-12"},
  {id:7,title:"Misty Morning",tag:"NEW",cover:"https://picsum.photos/seed/a7c/400/560",photos:Array.from({length:10},(_,i)=>`https://picsum.photos/seed/a7x${i}/800/1100`),views:3410,date:"2024-03-17"},
  {id:8,title:"Urban Chic Vol.2",tag:"HOT",cover:"https://picsum.photos/seed/a8c/400/560",photos:Array.from({length:13},(_,i)=>`https://picsum.photos/seed/a8x${i}/800/1100`),views:8760,date:"2024-03-11"},
];

/* SVG Icons */
function Ic({d, s=18}) {
  return (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
      dangerouslySetInnerHTML={{__html:d}}/>
  );
}
const I = {
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>',
  left:'<polyline points="15 18 9 12 15 6"/>',
  right:'<polyline points="9 18 15 12 9 6"/>',
  close:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  zin:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>',
  zout:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><line x1="8" y1="11" x2="14" y2="11"/>',
  reset:'<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>',
  fs:'<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>',
  dl:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  play:'<polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>',
  pause:'<rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"/><rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"/>',
  up:'<polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
  eye:'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
  pic:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
  back:'<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  lock:'<rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  admin:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
  grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
  list:'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" fill="currentColor" stroke="none"/>',
};

/* ── LIGHTBOX ── */
function Lightbox({ photos, startIndex, onClose }) {
  const [idx, setIdx] = useState(startIndex);
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({x:0,y:0});
  const [drag, setDrag] = useState(false);
  const [ds, setDs] = useState({x:0,y:0});
  const [slide, setSlide] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const stRef = useRef();
  const pinchRef = useRef(null);

  const reset = () => { setScale(1); setPos({x:0,y:0}); };
  const go = (d) => { setIdx(i=>(i+d+photos.length)%photos.length); reset(); setLoaded(false); };
  const zIn = () => setScale(s=>Math.min(s+0.4,5));
  const zOut = () => setScale(s=>{ const n=s-0.4; if(n<=1){setPos({x:0,y:0});return 1;} return n; });

  useEffect(()=>{
    const h = e => {
      if(e.key==="ArrowLeft") go(-1);
      if(e.key==="ArrowRight") go(1);
      if(e.key==="Escape") onClose();
      if(e.key==="+") zIn();
      if(e.key==="-") zOut();
    };
    window.addEventListener("keydown", h);
    return ()=>window.removeEventListener("keydown", h);
  },[]);

  useEffect(()=>{
    if(slide) stRef.current = setInterval(()=>go(1), 3000);
    return ()=>clearInterval(stRef.current);
  },[slide, idx]);

  const onWheel = e=>{ e.preventDefault(); e.deltaY<0?zIn():zOut(); };
  const onMD = e=>{ if(scale<=1)return; setDrag(true); setDs({x:e.clientX-pos.x, y:e.clientY-pos.y}); };
  const onMM = e=>{ if(!drag)return; setPos({x:e.clientX-ds.x, y:e.clientY-ds.y}); };
  const onMU = ()=>setDrag(false);

  const onTM = e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(pinchRef.current) setScale(s=>Math.min(Math.max(s+(d-pinchRef.current)*0.01,1),5));
      pinchRef.current=d;
    }
  };

  const download = ()=>{
    const a=document.createElement("a");
    a.href=photos[idx]; a.download=`photo_${idx+1}.jpg`; a.target="_blank"; a.click();
  };

  return (
    <div className="lb" onTouchMove={onTM} onTouchEnd={()=>{pinchRef.current=null;}}>
      {/* Top Bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"rgba(0,0,0,0.8)",backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="df" style={{fontSize:14,color:"#fff",fontWeight:700}}>Photo Viewer</span>
          <span style={{background:"var(--accent)",color:"#fff",fontSize:11,padding:"1px 9px",borderRadius:20,fontWeight:700}}>{idx+1}/{photos.length}</span>
        </div>
        <div style={{display:"flex",gap:4}}>
          {[
            {tip:"Zoom In",ic:"zin",fn:zIn},
            {tip:"Zoom Out",ic:"zout",fn:zOut},
            {tip:"Reset",ic:"reset",fn:reset},
            {tip:"Fullscreen",ic:"fs",fn:()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()},
            {tip:"Download",ic:"dl",fn:download},
            {tip:slide?"Stop":"Slideshow",ic:slide?"pause":"play",fn:()=>setSlide(s=>!s)},
          ].map(({tip,ic,fn})=>(
            <button key={ic} title={tip} className="btn bg2 bi" onClick={fn}
              style={{color:"#fff",borderColor:"rgba(255,255,255,0.12)",width:32,height:32}}>
              <Ic d={I[ic]} s={14}/>
            </button>
          ))}
          <button className="btn bp bi" onClick={onClose} style={{width:32,height:32}}><Ic d={I.close} s={14}/></button>
        </div>
      </div>

      {/* Image Area */}
      <div className="lba" onWheel={onWheel} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
        style={{cursor:scale>1?(drag?"grabbing":"grab"):"default"}}>
        <button className="nbtn" style={{left:12}} onClick={()=>go(-1)}><Ic d={I.left} s={20}/></button>

        <div style={{transform:`translate(${pos.x}px,${pos.y}px) scale(${scale})`,transition:drag?"none":"transform 0.2s ease",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {!loaded && (
            <div style={{width:200,height:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{width:32,height:32,border:"3px solid var(--accent)",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            </div>
          )}
          <img className="lbi" src={photos[idx]} alt="" onLoad={()=>setLoaded(true)} style={{display:loaded?"block":"none"}}/>
        </div>

        <button className="nbtn" style={{right:12}} onClick={()=>go(1)}><Ic d={I.right} s={20}/></button>
      </div>

      {/* Zoom Info */}
      <div style={{textAlign:"center",padding:"5px",fontSize:11,color:"#555",flexShrink:0}}>
        Zoom: {Math.round(scale*100)}% · Scroll=Zoom · Drag=Pan · ←→ Keys · Pinch=Mobile Zoom
      </div>

      {/* Thumbnail Strip */}
      <div style={{display:"flex",gap:5,padding:"8px 14px",overflowX:"auto",background:"rgba(0,0,0,0.7)",flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.05)"}}>
        {photos.map((p,i)=>(
          <img key={i} src={p} className={`thm ${i===idx?"act":""}`}
            onClick={()=>{setIdx(i);reset();setLoaded(false);}}/>
        ))}
      </div>
    </div>
  );
}

/* ── ALBUM DETAIL ── */
function AlbumDetail({ album, onBack }) {
  const [lb, setLb] = useState(null);
  const [cols, setCols] = useState(window.innerWidth < 600 ? 2 : 4);

  return (
    <div className="fi" style={{minHeight:"100vh",background:"var(--bg)"}}>
      {lb !== null && <Lightbox photos={album.photos} startIndex={lb} onClose={()=>setLb(null)}/>}

      <div style={{background:"linear-gradient(180deg,rgba(232,25,60,0.12) 0%,transparent 100%)",borderBottom:"1px solid var(--border)",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <button className="btn bg2" onClick={onBack} style={{gap:6}}><Ic d={I.back} s={14}/> Back</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <h1 className="df" style={{fontSize:22,fontWeight:700}}>{album.title}</h1>
            <span className="tag" style={{background:TC[album.tag]||"#666",color:"#fff"}}>{album.tag}</span>
          </div>
          <p style={{color:"var(--muted)",fontSize:12,marginTop:2}}>{album.photos.length} Photos · {album.views?.toLocaleString()} views</p>
        </div>
        <div style={{display:"flex",gap:4"}}>
          {[2,3,4].map(c=>(
            <button key={c} onClick={()=>setCols(c)} className="btn bg2 bi"
              style={{width:28,height:28,fontSize:11,fontWeight:700,color:cols===c?"var(--accent)":"var(--muted)",borderColor:cols===c?"var(--accent)":"var(--border)"}}>{c}</button>
          ))}
        </div>
      </div>

      <div style={{padding:"16px 20px",display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:6}}>
        {album.photos.map((p,i)=>(
          <div key={i} className="pi fi" style={{animationDelay:`${i*0.025}s`}} onClick={()=>setLb(i)}>
            <img src={p} alt={`${i+1}`} loading="lazy"/>
            <div style={{position:"absolute",bottom:4,right:4,background:"rgba(0,0,0,0.65)",color:"#fff",fontSize:9,padding:"1px 4px",borderRadius:3}}>{i+1}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── ADMIN PANEL ── */
function AdminPanel({ albums, onAdd, onDel, onClose }) {
  const [tab, setTab] = useState("list");
  const [title, setTitle] = useState("");
  const [tag, setTag] = useState("HOT");
  const [photos, setPhotos] = useState([]);
  const [cover, setCover] = useState("");
  const [isDrag, setDrag] = useState(false);
  const [prog, setProg] = useState(0);
  const [loading, setLoading] = useState(false);
  const [pw, setPw] = useState("");
  const [auth, setAuth] = useState(false);
  const [err, setErr] = useState(false);
  const fRef = useRef();

  const handleFiles = (files) => {
    const urls = Array.from(files).filter(f=>f.type.startsWith("image/")).map(f=>URL.createObjectURL(f));
    setPhotos(p=>[...p,...urls]);
    if(!cover && urls.length) setCover(urls[0]);
    setLoading(true); setProg(0);
    let p=0;
    const t=setInterval(()=>{ p+=12; setProg(Math.min(p,100)); if(p>=100){clearInterval(t);setLoading(false);} },80);
  };

  const submit = () => {
    if(!title.trim()) return alert("অ্যালবামের নাম দিন!");
    const ps = photos.length>0 ? photos : Array.from({length:6},(_,i)=>`https://picsum.photos/seed/n${Date.now()}${i}/800/1100`);
    const cv = cover||`https://picsum.photos/seed/nc${Date.now()}/400/560`;
    onAdd({id:Date.now(),title,tag,cover:cv,photos:ps,views:0,date:new Date().toISOString().split("T")[0]});
    setTitle(""); setPhotos([]); setCover(""); setProg(0); setTab("list");
  };

  if(!auth) return (
    <div style={{position:"fixed",inset:0,zIndex:960,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div className="si" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:32,width:"100%",maxWidth:320,textAlign:"center"}}>
        <div style={{width:52,height:52,background:"rgba(232,25,60,0.15)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <Ic d={I.lock} s={22}/>
        </div>
        <h2 className="df" style={{fontSize:20,marginBottom:4}}>Admin Access</h2>
        <p style={{color:"var(--muted)",fontSize:12,marginBottom:16}}>Password: <code style={{color:"var(--accent)"}}>admin123</code></p>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&(pw==="admin123"?setAuth(true):setErr(true))}
          placeholder="পাসওয়ার্ড দিন" style={{marginBottom:err?4:12}}/>
        {err && <p style={{color:"var(--accent)",fontSize:12,marginBottom:8}}>ভুল পাসওয়ার্ড!</p>}
        <div style={{display:"flex",gap:8}}>
          <button className="btn bg2" onClick={onClose} style={{flex:1,justifyContent:"center"}}>বাতিল</button>
          <button className="btn bp" onClick={()=>pw==="admin123"?setAuth(true):setErr(true)} style={{flex:1,justifyContent:"center"}}>লগইন</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(4px)",display:"flex",justifyContent:"flex-end"}}>
      <div className="si" style={{width:"100%",maxWidth:480,background:"var(--surface)",borderLeft:"1px solid var(--border)",display:"flex",flexDirection:"column",maxHeight:"100vh",overflowY:"auto"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"var(--surface)",zIndex:1}}>
          <span className="df" style={{fontSize:18,fontWeight:700}}>⚙ Admin Panel</span>
          <button className="btn bg2 bi" onClick={onClose}><Ic d={I.close} s={16}/></button>
        </div>

        <div style={{display:"flex",gap:6,padding:"10px 20px",borderBottom:"1px solid var(--border)"}}>
          {["list","upload"].map(t=>(
            <button key={t} className={`nt ${tab===t?"act":""}`} onClick={()=>setTab(t)}>
              {t==="list"?"অ্যালবাম দেখুন":"নতুন আপলোড"}
            </button>
          ))}
        </div>

        <div style={{padding:20,flex:1}}>
          {tab==="list" ? (
            <div>
              <p style={{color:"var(--muted)",fontSize:13,marginBottom:12}}>{albums.length}টি অ্যালবাম</p>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {albums.map(a=>(
                  <div key={a.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--card)",borderRadius:10,padding:"10px",border:"1px solid var(--border)"}}>
                    <img src={a.cover} style={{width:40,height:52,objectFit:"cover",borderRadius:6,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div>
                      <div style={{color:"var(--muted)",fontSize:11}}>{a.photos.length} photos · {a.views?.toLocaleString()} views</div>
                    </div>
                    <span className="tag" style={{background:TC[a.tag]||"#666",color:"#fff",flexShrink:0}}>{a.tag}</span>
                    <button className="btn bg2 bi" onClick={()=>onDel(a.id)}
                      style={{color:"#e63946",borderColor:"rgba(230,57,70,0.3)",width:30,height:30,flexShrink:0}}>
                      <Ic d={I.trash} s={13}/>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              <div>
                <label style={{fontSize:13,color:"var(--muted)",display:"block",marginBottom:5}}>অ্যালবামের নাম *</label>
                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="যেমন: Xiuren No.6789"/>
              </div>

              <div>
                <label style={{fontSize:13,color:"var(--muted)",display:"block",marginBottom:8}}>ট্যাগ বেছে নিন</label>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {["HOT","NEW","TRENDING","POPULAR","XIUREN"].map(t=>(
                    <button key={t} className={`nt ${tag===t?"act":""}`} onClick={()=>setTag(t)}
                      style={{background:tag===t?TC[t]:"transparent",borderColor:tag===t?TC[t]:"var(--border)",color:tag===t?"#fff":"var(--muted)"}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label style={{fontSize:13,color:"var(--muted)",display:"block",marginBottom:8}}>ছবি আপলোড করুন</label>
                <div className={`dz ${isDrag?"drag":""}`}
                  onDragOver={e=>{e.preventDefault();setDrag(true);}}
                  onDragLeave={()=>setDrag(false)}
                  onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}
                  onClick={()=>fRef.current.click()}>
                  <Ic d={I.up} s={28}/>
                  <p style={{marginTop:8,fontWeight:500}}>ছবি ড্রপ করুন বা ক্লিক করুন</p>
                  <p style={{color:"var(--muted)",fontSize:12,marginTop:3}}>JPG, PNG, WEBP সাপোর্টেড</p>
                  <input ref={fRef} type="file" multiple accept="image/*" style={{display:"none"}}
                    onChange={e=>handleFiles(e.target.files)}/>
                </div>

                {loading && (
                  <div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginTop:8,marginBottom:2}}>
                      <span>আপলোড হচ্ছে...</span><span>{prog}%</span>
                    </div>
                    <div className="pb"><div className="pf" style={{width:`${prog}%`}}/></div>
                  </div>
                )}

                {photos.length>0 && (
                  <div style={{marginTop:10}}>
                    <p style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>{photos.length}টি ছবি · কভার সেট করতে ক্লিক করুন</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {photos.slice(0,10).map((p,i)=>(
                        <img key={i} src={p} onClick={()=>setCover(p)}
                          style={{width:44,height:56,objectFit:"cover",borderRadius:5,cursor:"pointer",border:p===cover?"2px solid var(--accent)":"2px solid transparent"}}/>
                      ))}
                      {photos.length>10 && (
                        <div style={{width:44,height:56,background:"var(--card)",borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"var(--muted)"}}>+{photos.length-10}</div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              <button className="btn bp" onClick={submit} style={{width:"100%",padding:"11px",fontSize:14,justifyContent:"center"}}>
                <Ic d={I.up} s={15}/> অ্যালবাম তৈরি করুন
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [albums, setAlbums] = useState(ALBUMS);
  const [filter, setFilter] = useState("ALL");
  const [sort, setSort] = useState("newest");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [admin, setAdmin] = useState(false);
  const [vMode, setVMode] = useState("grid");

  const filtered = albums
    .filter(a=>filter==="ALL"||a.tag===filter)
    .filter(a=>a.title.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sort==="newest") return new Date(b.date)-new Date(a.date);
      if(sort==="popular") return (b.views||0)-(a.views||0);
      if(sort==="oldest") return new Date(a.date)-new Date(b.date);
      return 0;
    });

  if(selected) return <AlbumDetail album={selected} onBack={()=>setSelected(null)}/>;

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)"}}>
      {admin && <AdminPanel albums={albums} onAdd={a=>setAlbums(p=>[a,...p])} onDel={id=>setAlbums(p=>p.filter(a=>a.id!==id))} onClose={()=>setAdmin(false)}/>}

      {/* HEADER */}
      <header style={{borderBottom:"1px solid var(--border)",background:"rgba(10,10,12,0.95)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 16px",height:56,display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:32,height:32,background:"var(--accent)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Ic d={I.star} s={15}/>
            </div>
            <span className="df" style={{fontSize:18,fontWeight:900,letterSpacing:"-0.5px"}}>
              GIRLZ<span style={{color:"var(--accent)"}}>PIC</span>
            </span>
          </div>

          <div style={{position:"relative",marginLeft:"auto"}}>
            <div style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--muted)"}}><Ic d={I.search} s={13}/></div>
            <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
              style={{width:window.innerWidth<600?130:200,paddingLeft:30,background:"var(--card)",border:"1px solid var(--border)",color:"var(--text)",borderRadius:8,padding:"7px 10px 7px 30px",fontFamily:"'DM Sans',sans-serif",fontSize:13,outline:"none"}}
              onFocus={e=>e.target.style.borderColor="var(--accent)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
          </div>

          <select value={sort} onChange={e=>setSort(e.target.value)} className="hide-mobile">
            <option value="newest">Newest</option>
            <option value="popular">Popular</option>
            <option value="oldest">Oldest</option>
          </select>

          <div style={{display:"flex",gap:3,background:"var(--card)",borderRadius:8,padding:3,border:"1px solid var(--border)"}}>
            {["grid","list"].map(m=>(
              <button key={m} onClick={()=>setVMode(m)}
                style={{background:vMode===m?"var(--accent)":"transparent",border:"none",color:"#fff",borderRadius:6,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all 0.2s"}}>
                <Ic d={I[m]} s={13}/>
              </button>
            ))}
          </div>

          <button className="btn bg2" onClick={()=>setAdmin(true)} style={{gap:5,fontSize:12,padding:"6px 10px"}}>
            <Ic d={I.admin} s={14}/> <span className="hide-mobile">Admin</span>
          </button>
        </div>
      </header>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,rgba(232,25,60,0.15) 0%,rgba(10,10,12,0) 55%)",borderBottom:"1px solid var(--border)",padding:"22px 16px 18px",maxWidth:1400,margin:"0 auto"}}>
        <h1 className="df" style={{fontSize:window.innerWidth<600?26:36,fontWeight:900,lineHeight:1.1}}>
          Premium <span style={{color:"var(--accent)"}}>Photo</span> Collections
        </h1>
        <p style={{color:"var(--muted)",marginTop:5,fontSize:13}}>
          {albums.length} Albums · {albums.reduce((s,a)=>s+a.photos.length,0)} Photos
        </p>
      </div>

      {/* FILTER TABS */}
      <div style={{borderBottom:"1px solid var(--border)",background:"var(--surface)"}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"8px 16px",display:"flex",gap:5,overflowX:"auto",alignItems:"center"}}>
          {TAGS.map(t=>(
            <button key={t} className={`nt ${filter===t?"act":""}`} onClick={()=>setFilter(t)}
              style={{background:filter===t?(t==="ALL"?"var(--accent)":TC[t]||"var(--accent)"):"transparent",
                borderColor:filter===t?(t==="ALL"?"var(--accent)":TC[t]||"var(--accent)"):"var(--border)",
                color:filter===t?"#fff":"var(--muted)"}}>
              {t}
            </button>
          ))}
          <span style={{marginLeft:"auto",color:"var(--muted)",fontSize:11,flexShrink:0}}>{filtered.length} results</span>
        </div>
      </div>

      {/* ALBUM GRID */}
      <main style={{maxWidth:1400,margin:"0 auto",padding:"20px 16px 60px"}}>
        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:"80px 0",color:"var(--muted)"}}>
            <Ic d={I.pic} s={44}/><p style={{marginTop:12,fontSize:15}}>কোনো অ্যালবাম পাওয়া যায়নি</p>
          </div>
        ) : vMode==="grid" ? (
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:12}}>
            {filtered.map((a,i)=>(
              <div key={a.id} className="card fi" style={{animationDelay:`${i*0.04}s`}} onClick={()=>setSelected(a)}>
                <img className="cimg" src={a.cover} alt={a.title} loading="lazy"/>
                <div className="covr"/>
                <div style={{position:"absolute",top:7,left:7}}>
                  <span className="tag" style={{background:TC[a.tag]||"#666",color:"#fff"}}>{a.tag}</span>
                </div>
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"10px"}}>
                  <p className="df" style={{fontSize:13,fontWeight:700,lineHeight:1.3,marginBottom:4}}>{a.title}</p>
                  <div style={{display:"flex",justifyContent:"space-between"}}>
                    <span style={{color:"rgba(255,255,255,0.55)",fontSize:10}}>{a.photos.length} photos</span>
                    <span style={{color:"rgba(255,255,255,0.55)",fontSize:10}}>{(a.views||0).toLocaleString()}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.map((a,i)=>(
              <div key={a.id} className="fi"
                style={{display:"flex",gap:12,background:"var(--card)",borderRadius:10,padding:"10px",border:"1px solid var(--border)",cursor:"pointer",transition:"all 0.2s",animationDelay:`${i*0.03}s`}}
                onClick={()=>setSelected(a)}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--accent)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";}}>
                <img src={a.cover} style={{width:54,height:70,objectFit:"cover",borderRadius:7,flexShrink:0}}/>
                <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                    <span className="df" style={{fontSize:14,fontWeight:700}}>{a.title}</span>
                    <span className="tag" style={{background:TC[a.tag]||"#666",color:"#fff"}}>{a.tag}</span>
                  </div>
                  <div style={{color:"var(--muted)",fontSize:11,display:"flex",gap:10,flexWrap:"wrap"}}>
                    <span>{a.photos.length} photos</span>
                    <span>{(a.views||0).toLocaleString()} views</span>
                    <span>{a.date}</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",color:"var(--muted)"}}><Ic d={I.right} s={15}/></div>
              </div>
            ))}
          </div>
        )}
      </main>

      {/* FOOTER */}
      <footer style={{borderTop:"1px solid var(--border)",background:"var(--surface)",padding:"16px",textAlign:"center",color:"var(--muted)",fontSize:11}}>
        <span className="df" style={{color:"var(--accent)"}}>GIRLZPIC</span> · Premium Photo Collections · {new Date().getFullYear()}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
